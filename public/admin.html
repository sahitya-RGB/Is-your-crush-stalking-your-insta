<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #444; padding: 12px; text-align: left; }
        th { background: #ff75c3; color: white; }
        tr:nth-child(even) { background: #222; }
    </style>
</head>
<body>
    <h1>Submissions Log</h1>
    <table id="adminTable">
        <thead>
            <tr>
                <th>Crush Username</th>
                <th>Your Username</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="logBody"></tbody>
    </table>

    <script>
        const data = JSON.parse(localStorage.getItem('prankData') || "[]");
        const body = document.getElementById('logBody');
        
        data.reverse().forEach(item => {
            const row = `<tr>
                <td>${item.crush}</td>
                <td>${item.user}</td>
                <td>${item.time}</td>
            </tr>`;
            body.innerHTML += row;
        });
    </script>
</body>
</html>
